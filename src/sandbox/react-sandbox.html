<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>React 18 + TS Monaco Sandbox</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1e1e1e;
      color: #ffffff;
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      height: 100vh;
      gap: 0;
    }

    /* Левая панель */
    .panel {
      display: flex;
      flex-direction: column;
      background: #252526;
      border-right: 1px solid #3e3e42;
      transition: width 0.3s ease;
    }

    .left-panel {
      width: 250px;
      min-width: 250px;
    }

    .left-panel.collapsed {
      width: 45px;
      min-width: 45px;
    }

    /* Центральный редактор */
    #editor-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* Правая панель */
    .right-panel {
      width: calc(100% / 3);
      min-width: calc(100% / 3);
      border-left: 1px solid #3e3e42;
      transition: width 0.3s ease;
    }

    .right-panel.collapsed {
      width: 50px;
      min-width: 50px;
    }

    /* Заголовок панели */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: #1e1e1e;
      border-bottom: 1px solid #3e3e42;
      user-select: none;
      min-height: 45px;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
    }

    .left-panel.collapsed .panel-title,
    .right-panel.collapsed .panel-title {
      display: none;
    }

    /* Кнопка сворачивания */
    .collapse-btn {
      background: none;
      border: none;
      color: #858585;
      cursor: pointer;
      padding: 4px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: color 0.2s;
      flex-shrink: 0;
      min-width: 30px;
      height: 30px;
    }

    .collapse-btn:hover {
      color: #ffffff;
    }

    /* Содержимое панелей */
    .panel-content {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Левая панель - список файлов */
    #files {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .file-item {
      padding: 10px 8px;
      margin: 4px 0;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.2s;
      background: #2d2d30;
      color: #cccccc;
    }

    .file-item:hover {
      background: #3e3e42;
      color: #ffffff;
    }

    .file-item.active {
      background: #007acc;
      color: #ffffff;
    }

    #add-file-btn {
      background: #007acc;
      border: none;
      color: white;
      padding: 10px;
      margin: 8px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
      white-space: nowrap;
      font-size: 13px;
    }

    #add-file-btn:hover {
      background: #005a9e;
    }

    .left-panel.collapsed #add-file-btn {
      display: none;
    }

    /* Правая панель - превью */
    #preview {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }

    /* Модальное окно */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #252526;
      border: 1px solid #3e3e42;
      border-radius: 8px;
      padding: 20px;
      min-width: 400px;
    }

    .modal-content h3 {
      margin-bottom: 15px;
      color: #cccccc;
    }

    .modal-content input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      background: #3c3c3c;
      border: 1px solid #3e3e42;
      color: #cccccc;
      border-radius: 4px;
      font-size: 13px;
    }

    .modal-content input::placeholder {
      color: #858585;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-buttons button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .btn-cancel {
      background: #3e3e42;
      color: #cccccc;
    }

    .btn-cancel:hover {
      background: #4e4e52;
    }

    .btn-create {
      background: #007acc;
      color: white;
    }

    .btn-create:hover {
      background: #005a9e;
    }

    /* Скроллбар */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #1e1e1e;
    }

    ::-webkit-scrollbar-thumb {
      background: #464646;
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #5a5a5a;
    }
  </style>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
</head>

<body>
  <div id="app">
    <!-- Левая панель (файлы) -->
    <div class="panel left-panel" id="leftPanel">
      <div class="panel-header">
        <span class="panel-title">FILES</span>
        <button class="collapse-btn" id="leftCollapseBtn" title="Свернуть панель">◀</button>
      </div>
      <div class="panel-content">
        <div id="files"></div>
        <button id="add-file-btn">➕ Добавить файл</button>
      </div>
    </div>

    <!-- Центральный редактор -->
    <div id="editor-container"></div>

    <!-- Правая панель (превью) -->
    <div class="panel right-panel" id="rightPanel">
      <div class="panel-header">
        <span class="panel-title">PREVIEW</span>
        <button class="collapse-btn" id="rightCollapseBtn" title="Свернуть панель">▶</button>
      </div>
      <div class="panel-content">
        <iframe id="preview"></iframe>
      </div>
    </div>
  </div>

  <!-- Модальное окно -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <h3>Добавить новый файл</h3>
      <input type="text" id="fileName" placeholder="Например: Card.tsx">
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeModal()">Отмена</button>
        <button class="btn-create" onclick="createFile()">Создать</button>
      </div>
    </div>
  </div>

  <script>
    require.config({ paths: { vs: "https://unpkg.com/monaco-editor@0.45.0/min/vs" } });

    require(["vs/editor/editor.main"], async function () {
      // ============ СОСТОЯНИЕ ПАНЕЛЕЙ ============
      const leftPanel = document.getElementById("leftPanel");
      const rightPanel = document.getElementById("rightPanel");
      const leftCollapseBtn = document.getElementById("leftCollapseBtn");
      const rightCollapseBtn = document.getElementById("rightCollapseBtn");
      let leftCollapsed = localStorage.getItem("leftCollapsed") === "true";
      let rightCollapsed = localStorage.getItem("rightCollapsed") === "true";

      // Восстанавливаем состояние при загрузке
      if (leftCollapsed) {
        leftPanel.classList.add("collapsed");
        leftCollapseBtn.textContent = "▶";
      }
      if (rightCollapsed) {
        rightPanel.classList.add("collapsed");
        rightCollapseBtn.textContent = "◀";
      }

      // Сворачивание левой панели
      leftCollapseBtn.addEventListener("click", () => {
        leftCollapsed = !leftCollapsed;
        leftPanel.classList.toggle("collapsed");
        leftCollapseBtn.textContent = leftCollapsed ? "▶" : "◀";
        localStorage.setItem("leftCollapsed", leftCollapsed);
        setTimeout(() => editor.layout(), 300);
      });

      // Сворачивание правой панели
      rightCollapseBtn.addEventListener("click", () => {
        rightCollapsed = !rightCollapsed;
        rightPanel.classList.toggle("collapsed");
        rightCollapseBtn.textContent = rightCollapsed ? "◀" : "▶";
        localStorage.setItem("rightCollapsed", rightCollapsed);
        setTimeout(() => editor.layout(), 300);
      });

      // ============ MONACO EDITOR ============
      const tsDefaults = monaco.languages.typescript.typescriptDefaults;

      tsDefaults.setCompilerOptions({
        target: monaco.languages.typescript.ScriptTarget.ESNext,
        module: monaco.languages.typescript.ModuleKind.ESNext,
        moduleResolution: monaco.languages.typescript.ModuleResolutionKind.NodeJs,
        jsx: monaco.languages.typescript.JsxEmit.React,
        esModuleInterop: true,
        allowSyntheticDefaultImports: true,
        strict: false,
      });

      async function addType(url, path) {
        try {
          const res = await fetch(url);
          const text = await res.text();
          tsDefaults.addExtraLib(text, path);
        } catch (err) {
          console.error(`Ошибка загрузки типов ${path}:`, err);
        }
      }

      await addType(
        "https://unpkg.com/@types/react@18/index.d.ts",
        "file:///node_modules/@types/react/index.d.ts"
      );

      await addType(
        "https://unpkg.com/@types/react-dom@18/index.d.ts",
        "file:///node_modules/@types/react-dom/index.d.ts"
      );

      tsDefaults.addExtraLib(
        `
declare module "react" {
  export = React;
}
declare module "react-dom/client" {
  export const createRoot: typeof ReactDOM.createRoot;
}
        `,
        "file:///node_modules/custom-global.d.ts"
      );

      // ============ ФАЙЛЫ ============
      const files = {
        "Test.tsx": `import React from "react";

export function Test() {
  return <div style={{ padding: "20px", fontSize: "16px" }}>👋 Привет! Отредактируй этот файл</div>;
}`,
        "App.tsx": `import React from "react";
import { Test } from "./Test";

export function App() {
  return (
    <div>
      <h1 style={{ backgroundColor: "#007acc", color: "white", margin: 0, padding: "20px" }}>
        React Sandbox
      </h1>
      <Test />
    </div>
  );
}`,
        "index.tsx": `import React from "react";
import { createRoot } from "react-dom/client";
import { App } from "./App";

createRoot(document.getElementById("root")!).render(<App />);`,
      };

      const models = {};
      Object.keys(files).forEach(name => {
        const uri = monaco.Uri.parse("file:///" + name);
        models[name] = monaco.editor.createModel(files[name], "typescript", uri);
      });

      const editor = monaco.editor.create(
        document.getElementById("editor-container"),
        {
          model: models["Test.tsx"],
          theme: "vs-dark",
          automaticLayout: true,
          minimap: { enabled: false },
          fontSize: 14,
          fontFamily: "Menlo, Monaco, 'Courier New', monospace",
        }
      );

      const fileList = document.getElementById("files");
      let activeFile = "Test.tsx";

      // ============ УПРАВЛЕНИЕ ФАЙЛАМИ ============
      function renderFileList() {
        fileList.innerHTML = "";
        Object.keys(files).forEach(name => {
          if (name === "index.tsx" || name === "App.tsx") return;

          const div = document.createElement("div");
          div.className = "file-item" + (name === activeFile ? " active" : "");
          div.textContent = name;
          div.onclick = () => selectFile(name);
          fileList.appendChild(div);
        });
      }

      function selectFile(name) {
        document.querySelectorAll(".file-item").forEach(el => el.classList.remove("active"));
        const selectedDiv = Array.from(fileList.children).find(
          el => el.textContent === name
        );
        if (selectedDiv) selectedDiv.classList.add("active");
        activeFile = name;
        editor.setModel(models[name]);
      }

      function openModal() {
        document.getElementById("modal").classList.add("active");
        document.getElementById("fileName").focus();
        document.getElementById("fileName").value = "";
      }

      window.closeModal = function () {
        document.getElementById("modal").classList.remove("active");
      };

      window.createFile = function () {
        const fileName = document.getElementById("fileName").value.trim();

        if (!fileName) {
          alert("Введите имя файла");
          return;
        }

        if (files[fileName]) {
          alert(`Файл "${fileName}" уже существует`);
          return;
        }

        let content = "";
        if (fileName.endsWith(".tsx")) {
          content = `import React from "react";\n\nexport function ${fileName.slice(0, -4)}() {\n  return <div>Hello</div>;\n}`;
        } else if (fileName.endsWith(".ts")) {
          content = `// ${fileName}\n\nexport function myFunction() {\n  return "Hello";\n}`;
        } else {
          content = `// ${fileName}\n`;
        }

        files[fileName] = content;
        const uri = monaco.Uri.parse("file:///" + fileName);
        models[fileName] = monaco.editor.createModel(content, "typescript", uri);

        renderFileList();
        selectFile(fileName);
        closeModal();
        build();
      };

      document.getElementById("add-file-btn").addEventListener("click", openModal);

      document.getElementById("fileName").addEventListener("keypress", function (e) {
        if (e.key === "Enter") createFile();
      });

      document.getElementById("modal").addEventListener("click", function (e) {
        if (e.target === this) closeModal();
      });

      renderFileList();

      // ============ BUILD & COMPILE ============
      function extractExports(code) {
        const exports = {};

        const funcMatches = code.matchAll(
          /export\s+(function|const)\s+([a-zA-Z_$][a-zA-Z0-9_$]*)/g
        );
        for (const match of funcMatches) {
          exports[match[2]] = match[2];
        }

        const namedMatches = code.matchAll(/export\s*\{\s*([^}]+)\s*\}/g);
        for (const match of namedMatches) {
          match[1].split(",").forEach(name => {
            exports[name.trim()] = name.trim();
          });
        }

        return exports;
      }

      function transformCode(code, filename) {
        const exports = extractExports(code);

        let cleaned = code
          .replace(/export\s+function\s+/g, "function ")
          .replace(/export\s+const\s+/g, "const ")
          .replace(/export\s+class\s+/g, "class ")
          .replace(/export\s+type\s+/g, "type ")
          .replace(/export\s+interface\s+/g, "interface ")
          .replace(/export\s*\{[^}]*\}/g, "");

        const result = Babel.transform(cleaned, {
          filename: filename,
          presets: ["typescript", ["react", { runtime: "automatic" }]],
          plugins: [["transform-modules-commonjs", { allowTopLevelThis: true }]],
          compact: false,
          retainLines: true,
        }).code;

        let finalCode = result;
        if (Object.keys(exports).length > 0) {
          const exportLines = Object.keys(exports)
            .map(name => `module.exports.${name} = ${name};`)
            .join("\n");
          finalCode = result + "\n" + exportLines;
        }

        return finalCode;
      }

      function build() {
        try {
          const compiled = {};
          Object.keys(models).forEach(filename => {
            const code = models[filename].getValue();
            compiled[filename] = transformCode(code, filename);
          });

          const compiledMap = {};
          Object.keys(compiled).forEach(filename => {
            const moduleName = filename.replace(/\.(tsx?|js)$/, "");
            compiledMap[moduleName] = JSON.stringify(compiled[filename]);
          });

          const moduleLoaders = Object.keys(compiledMap)
            .map(
              name =>
                `if (normalized === '${name}') {
          if (!cache['${name}']) {
            const m = { exports: {} };
            (function(exports, module, require) {
              eval(${compiledMap[name]});
            })(m.exports, m, require);
            cache['${name}'] = m.exports;
          }
          return cache['${name}'];
        }`
            )
            .join("\n\n      ");

          const iframeDoc = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.development.js"><\/script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"><\/script>
  <script>
    const cache = {};
    function require(id) {
      if (id === 'react') return React;
      if (id === 'react-dom/client') return { createRoot: ReactDOM.createRoot };
      if (id === 'react/jsx-runtime') return {
        jsx: React.createElement,
        jsxs: React.createElement,
        Fragment: React.Fragment
      };
      
      let normalized = id;
      if (id.startsWith('./')) normalized = id.slice(2).replace(/\\.(tsx?|js)$/, '');
      
      ${moduleLoaders}
      
      throw new Error('Unknown module: ' + id);
    }
    
    try {
      (function() {
        eval(${compiledMap["index"]});
      })();
    } catch (e) {
      document.getElementById('root').innerHTML = 
        '<div style="color: red; padding: 20px; font-family: monospace; white-space: pre-wrap;">' +
        '<h3>❌ Runtime Error</h3>' +
        '<pre>' + (e.toString() + '\\n\\n' + e.stack).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])) + '</pre>' +
        '</div>';
    }
  <\/script>
</body>
</html>`;

          document.getElementById("preview").srcdoc = iframeDoc;
        } catch (err) {
          console.error("Build error:", err);
          const errorMsg = (err.message || String(err)).replace(/[&<>"']/g, m => ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#039;",
          }[m]));

          document.getElementById("preview").srcdoc = `
            <!DOCTYPE html>
            <html>
            <head>
              <style>
                body { margin: 0; padding: 20px; font-family: monospace; background: #1e1e1e; }
                pre { color: #f48771; background: #252526; padding: 15px; border-radius: 4px; }
              </style>
            </head>
            <body>
              <h3 style="color: #ce9178;">❌ Compilation Error</h3>
              <pre>${errorMsg}</pre>
            </body>
            </html>
          `;
        }
      }

      Object.values(models).forEach(m =>
        m.onDidChangeContent(() => {
          clearTimeout(window.buildTimeout);
          window.buildTimeout = setTimeout(() => build(), 800);
        })
      );

      build();
    });
  </script>
</body>
</html>
